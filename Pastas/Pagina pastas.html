<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="pastas.css">
        <link rel="icon" href="chis.png">
        <title>Pedido de Pasta</title>
    </head>

<body>

<div class="container">

    <div class="izquierda">
        <img class="imagen-pasta" src="plantilla.jpg" alt="Pasta italiana">

    </div>

    <div class="derecha">

        <h2>Realiza tu pedido</h2>

        <div class="precio"> Todas las pastas a $185.00 </div>

        <p> </p>

        <div class="pastas">

        <div class="pasta">
            <img src="alfredo.jpg" alt="Alfredo">
            <p>Alfredo</p>
        </div>

        <div class="pasta">
            <img src="pesto.jpg" alt="Pesto">
            <p>Pesto</p>
        </div>

        <div class="pasta">
            <img src="putanessca.jpg" alt="Puttanesca">
            <p>Puttanesca</p>
        </div>

        </div>
    </div>

</div>
<p></p>

    <form id="pedidoForm">

        <label>Pasta</label>
        <select id="pasta">
            <option>Alfredo</option>
            <option>Pesto</option>
            <option>Puttanesca</option>
        </select>

        <label>Nombre</label>
        <input type="text" placeholder="Nombre" id="nombre" required>

        <label>Direcci&oacute;n</label>
        <input type="text" placeholder="Dirección" pattern="[A-Za-z0-9\s#.,áéíóúÁÉÍÓÚ-]+" id="direccion" required>

        <label>Tel&eacute;fono</label>
        <input type="tel" placeholder="Teléfono" id="telefono" required>

        <button type="submit">Enviar pedido</button>
    </form>

<p class="mensaje" id="mensaje"></p>
</div>

</div>

    <script>

    const url = "https://script.google.com/macros/s/AKfycbyz6Lda9y_xJqFGPodfwRv83rX1uPqBxo8cuqTb-CaN0z2ZvqcPiP7y5xu7BAjIsS73JQ/exec";

    document.getElementById("pedidoForm")
    .addEventListener("submit", function(e){

        e.preventDefault();

        const datos = {
            tipo: document.getElementById("pasta").value,
            nombre: document.getElementById("nombre").value,
            direccion: document.getElementById("direccion").value,
            telefono: document.getElementById("telefono").value
        };

        fetch(url, {
            method:"POST",
            body: JSON.stringify(datos)
        }) 
        .then(res=>res.text())
        .then(data=>{
            document.getElementById("mensaje").innerHTML="Datos guardados correctamente";
            document.getElementById("pedidoForm").reset();
        })
        .catch(error=>{
        document.getElementById("mensaje").innerHTML="Error al guardar";
        });
    });
    </script>

</body>

</html>
